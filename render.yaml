services:
  - type: web
    name: aquaintel-scar
    env: python
    region: singapore
    plan: free
    buildCommand: "pip install --upgrade pip && pip install --only-binary=pandas pandas==2.2.1 && pip install -r requirements.txt"
    startCommand: "gunicorn backend.app:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.13"
      - key: GENAI_API_KEY
        sync: false
