services:
  - type: web
    name: water-scarcity-api
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT backend.app:app --workers 2 --threads 2 --timeout 30
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
    autoDeploy: true
